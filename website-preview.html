<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitGuard — قريباً · Coming Soon</title>
<meta name="description" content="FitGuard — first Arabic AI fitness safety coach. Train smart, stay safe. Launching in Saudi Arabia Q4 2026."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0C0A08; --surface:#16120D; --surface-2:#1E1810;
    --border:rgba(255,170,110,.10); --border-hi:rgba(255,107,0,.45);
    --orange:#FF6B00; --orange-bright:#FF8C38; --ember:#FFC15E;
    --ember-grad:linear-gradient(135deg,#FF6B00 0%,#FFA94D 60%,#FFC15E 100%);
    --green:#2BD9A0; --red:#FF5A6E;
    --text:#F5EFE8; --text-2:rgba(245,239,232,.66); --text-3:rgba(245,239,232,.4);
    --num:'Rajdhani',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;line-height:1.8;overflow-x:hidden;
    background-image:radial-gradient(ellipse 90% 50% at 80% -5%, rgba(255,138,61,.07), transparent 55%)}
  body[dir="ltr"]{font-family:'Inter',sans-serif;line-height:1.7}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:repeating-linear-gradient(135deg,rgba(255,138,61,.022) 0,rgba(255,138,61,.022) 1px,transparent 1px,transparent 26px)}
  .wrap{max-width:1140px;margin:auto;padding:0 24px;position:relative;z-index:1}
  a{color:inherit;text-decoration:none}
  .num{font-family:var(--num)}

  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(12,10,8,.7);border-bottom:1px solid var(--border)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;padding-top:14px;padding-bottom:14px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:20px}
  .logo .mark{width:30px;height:30px;border-radius:9px;background:var(--ember-grad);display:grid;place-items:center;font-size:15px;color:#1a0f04}
  .logo b{color:var(--orange)}
  .nav-r{display:flex;align-items:center;gap:14px}
  .nav-cta{background:var(--ember-grad);color:#1a0f04;font-weight:700;font-size:14px;padding:9px 18px;border-radius:999px;cursor:pointer;border:none;font-family:inherit}
  .lang-btn{font-family:var(--num);font-size:13px;color:var(--text-2);border:1px solid var(--border);padding:6px 14px;border-radius:999px;cursor:pointer;background:none}
  .lang-btn:hover{border-color:var(--border-hi);color:var(--ember)}

  .hero{padding:64px 0 48px}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
  @media(max-width:860px){.hero-grid{grid-template-columns:1fr;text-align:center}}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ember);border:1px solid var(--border-hi);background:rgba(255,107,0,.08);padding:6px 16px;border-radius:999px;margin-bottom:24px}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  h1{font-size:clamp(38px,6.6vw,70px);font-weight:900;line-height:1.08;margin-bottom:20px;letter-spacing:-.5px}
  h1 .hl{color:var(--orange)}
  .hero-sub{font-size:17.5px;color:var(--text-2);font-weight:300;max-width:520px;margin-bottom:28px;line-height:1.7}
  @media(max-width:860px){.hero-sub{margin-inline:auto}}

  /* Hero trust stats under the form */
  .hero-stats{display:flex;gap:26px;margin-top:22px}
  @media(max-width:860px){.hero-stats{justify-content:center}}
  .hstat{display:flex;flex-direction:column}
  .hstat b{font-family:var(--num);font-size:24px;font-weight:700;color:var(--ember);line-height:1}
  .hstat span{font-size:11.5px;color:var(--text-3);margin-top:3px}
  .hstat-div{width:1px;background:var(--border)}

  .wait{display:flex;gap:10px;max-width:480px;margin-bottom:14px}
  @media(max-width:860px){.wait{margin-inline:auto}}
  @media(max-width:480px){.wait{flex-direction:column}}
  .wait input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:14px;padding:15px 18px;color:var(--text);font-family:inherit;font-size:15px;outline:none}
  .wait input:focus{border-color:var(--border-hi)}
  .wait button{background:var(--ember-grad);color:#1a0f04;border:none;border-radius:14px;padding:15px 26px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}
  .wait button:disabled{opacity:.7;cursor:default}
  .wait-note{font-size:13px;color:var(--text-3)}
  .wait-note b{color:var(--ember);font-family:var(--num);font-size:15px}
  .form-msg{font-size:13px;margin-top:4px;min-height:18px}
  .form-msg.ok{color:var(--green)} .form-msg.err{color:var(--red)}

  .phone-wrap{display:flex;justify-content:center}
  .phone{width:300px;border-radius:38px;border:1px solid rgba(255,255,255,.1);overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 60px rgba(255,107,0,.08);background:var(--bg)}
  .ph-status{height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-3)}
  .ph-b{padding:6px 16px 18px}
  .ph-h{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .ph-h .m{width:22px;height:22px;border-radius:6px;background:var(--ember-grad);display:grid;place-items:center;font-size:11px;color:#1a0f04;font-weight:900}
  .ph-h .t{font-weight:900;font-size:13px}
  .ph-greet{font-size:11px;color:var(--text-2);margin-bottom:12px}
  .ring-card{display:flex;gap:12px;align-items:center;background:linear-gradient(160deg,#1c140c,#16120d);border:1px solid var(--border-hi);border-radius:18px;padding:14px;margin-bottom:10px}
  .ring{width:74px;height:74px;flex:0 0 auto;position:relative}
  .ring .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .c b{font-family:var(--num);font-size:25px;color:var(--ember);line-height:1}
  .ring .c small{font-size:8px;color:var(--text-3)}
  .ring-m h4{font-size:13px;margin-bottom:2px}
  .ring-m p{font-size:10.5px;color:var(--text-2);line-height:1.45}
  .pray{display:flex;gap:5px}
  .pc{flex:1;text-align:center;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:6px 2px}
  .pc.on{background:rgba(255,107,0,.13);border-color:var(--border-hi)}
  .pc .n{font-size:8px;color:var(--text-3)}
  .pc.on .n{color:var(--ember)}
  .pc .t{font-family:var(--num);font-size:11px;font-weight:700;margin-top:1px}

  section{padding:64px 0}
  .sec-tag{font-family:var(--num);letter-spacing:3px;font-size:12px;color:var(--orange);text-transform:uppercase;margin-bottom:10px;text-align:center}
  .sec-title{font-size:clamp(24px,3.5vw,38px);font-weight:900;text-align:center;margin-bottom:12px;line-height:1.2}
  .sec-sub{color:var(--text-2);text-align:center;max-width:600px;margin:0 auto 44px;font-weight:300}

  .gap{background:var(--surface);border-block:1px solid var(--border)}
  .gap-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
  .gap-card{flex:1;min-width:230px;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:24px}
  .gap-card .x{color:var(--red);font-weight:700;font-size:13px;margin-bottom:8px}
  .gap-card .ok{color:var(--ember);font-weight:700;font-size:13px;margin-bottom:8px}
  .gap-card p{font-size:14px;color:var(--text-2)}
  .gap-highlight{margin-top:24px;text-align:center;font-size:18px;font-weight:700}
  .gap-highlight .hl{color:var(--orange)}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:760px){.steps{grid-template-columns:1fr}}
  .step{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 22px}
  .step .num{font-family:var(--num);font-size:54px;font-weight:700;color:rgba(255,107,0,.16);line-height:.8;margin-bottom:10px}
  .step h3{font-size:18px;font-weight:700;margin-bottom:8px}
  .step p{font-size:14px;color:var(--text-2)}

  .feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:760px){.feat{grid-template-columns:1fr}}
  .fc{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;transition:.2s}
  .fc:hover{border-color:var(--border-hi);transform:translateY(-3px)}
  .fc .ic{font-size:28px;margin-bottom:12px}
  .fc h3{font-size:16px;font-weight:700;margin-bottom:6px}
  .fc p{font-size:13.5px;color:var(--text-2)}
  .fc .tag{display:inline-block;margin-top:12px;font-size:11px;color:var(--ember);border:1px solid var(--border-hi);border-radius:999px;padding:3px 10px}

  .vision{background:linear-gradient(135deg,#1a0f04,#0c0a08);border-block:1px solid var(--border);text-align:center}
  .vision h2{font-size:clamp(22px,3vw,32px);font-weight:900;margin-bottom:12px}
  .vision p{color:var(--text-2);max-width:560px;margin:0 auto;font-weight:300}
  .vision .stat{font-family:var(--num);font-size:46px;font-weight:700;color:var(--orange);margin-top:18px}
  .vision .stat-l{font-size:13px;color:var(--text-3)}

  .final{text-align:center}
  .final h2{font-size:clamp(26px,4vw,42px);font-weight:900;margin-bottom:14px}
  .final p{color:var(--text-2);margin-bottom:28px;font-weight:300}

  footer{background:#080705;border-top:1px solid var(--border);padding:36px 0;text-align:center}
  footer .logo{justify-content:center;margin-bottom:12px}
  footer p{font-size:12.5px;color:var(--text-3)}
  footer a{color:var(--text-2)}
  .fnote{margin-top:14px;font-size:11px;color:var(--text-3)}

  .preview-banner{background:var(--orange);color:#1a0f04;text-align:center;font-weight:700;font-size:13px;padding:8px}

  /* ═══════════ DYNAMIC / MOTION LAYER ═══════════ */

  /* Scroll reveal — elements rise + fade as they enter view */
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
  .reveal.in{opacity:1;transform:none}
  .reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}
  .reveal.d4{transition-delay:.32s}.reveal.d5{transition-delay:.40s}

  /* Floating ambient ember orbs behind hero */
  .orbs{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .orb{position:absolute;border-radius:50%;filter:blur(40px);opacity:.5;animation:orb-float 14s ease-in-out infinite}
  .orb1{width:280px;height:280px;background:radial-gradient(circle,rgba(255,107,0,.22),transparent 70%);top:-60px;inset-inline-start:-40px}
  .orb2{width:220px;height:220px;background:radial-gradient(circle,rgba(255,193,94,.16),transparent 70%);bottom:-40px;inset-inline-end:8%;animation-delay:-5s}
  .orb3{width:160px;height:160px;background:radial-gradient(circle,rgba(43,217,160,.10),transparent 70%);top:40%;inset-inline-end:30%;animation-delay:-9s}
  @keyframes orb-float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-26px) scale(1.08)}66%{transform:translate(-16px,18px) scale(.96)}}

  /* Hero phone floats gently + glows */
  .phone{animation:phone-float 5s ease-in-out infinite}
  @keyframes phone-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  /* Live readiness ring draws on load; number counts up */
  .ring svg circle:last-of-type{stroke-dasharray:195;stroke-dashoffset:195;animation:ring-fill 1.6s cubic-bezier(.4,0,.2,1) .6s forwards}
  @keyframes ring-fill{to{stroke-dashoffset:44}}

  /* Next-prayer cell pulses softly */
  .pc.on{animation:pc-pulse 2.4s ease-in-out infinite}
  @keyframes pc-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,0)}50%{box-shadow:0 0 0 4px rgba(255,107,0,.12)}}

  /* Pill live dot already blinks; add a subtle ring breathe */
  .pill .dot{animation:dot-blink 1.6s ease-in-out infinite}
  @keyframes dot-blink{0%,100%{opacity:1}50%{opacity:.35}}

  /* Buttons: shine sweep on hover */
  .nav-cta,.wait button{position:relative;overflow:hidden}
  .nav-cta::after,.wait button::after{content:'';position:absolute;top:0;inset-inline-start:-120%;width:60%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg);transition:none}
  .nav-cta:hover::after,.wait button:hover::after{animation:shine .7s ease}
  @keyframes shine{to{inset-inline-start:160%}}

  /* Feature cards: lift handled inline; add icon bob on hover */
  .fc:hover .ic{animation:bob .6s ease}
  @keyframes bob{0%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  /* Step number subtle count-glow on reveal */
  .step.in .num{animation:num-glow 1s ease}
  @keyframes num-glow{0%{color:rgba(255,107,0,.16)}40%{color:rgba(255,107,0,.5)}100%{color:rgba(255,107,0,.16)}}

  /* Animated gradient on the big highlight word */
  .gap-highlight .hl,h1 .hl{background:linear-gradient(100deg,#FF6B00,#FFC15E,#FF6B00);background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:hl-shift 4s linear infinite}
  @keyframes hl-shift{to{background-position:200% center}}

  /* Vision stat counts up (handled in JS), give it a glow pop on reveal */
  .vision.in .stat{animation:stat-pop .8s cubic-bezier(.34,1.56,.64,1)}
  @keyframes stat-pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}

  /* Scroll progress bar (top) */
  .scroll-prog{position:fixed;top:0;inset-inline-start:0;height:3px;width:0;z-index:60;
    background:var(--ember-grad);box-shadow:0 0 10px rgba(255,107,0,.6);transition:width .1s linear}

  /* Hero headline animates word-by-word on load */
  h1 .word-anim{display:inline-block;opacity:0;transform:translateY(24px) rotate(2deg);
    animation:word-rise .7s cubic-bezier(.22,1,.36,1) forwards}
  @keyframes word-rise{to{opacity:1;transform:none}}

  /* Phone screen cross-fade carousel */
  .ph-screens{position:relative}
  .ph-screen{position:absolute;inset:0;opacity:0;transition:opacity .6s ease;pointer-events:none}
  .ph-screen.active{opacity:1;position:relative;pointer-events:auto}
  .ph-dots{display:flex;gap:5px;justify-content:center;margin-top:10px}
  .ph-dot{width:5px;height:5px;border-radius:50%;background:var(--text-3);transition:.3s}
  .ph-dot.on{background:var(--orange);width:16px;border-radius:3px}

  /* Mini muscle-blueprint screen */
  .ph-ex{display:flex;gap:10px;align-items:center;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px}
  .ph-ex svg{width:34px;height:46px;flex:0 0 auto}
  .ph-ex .exn{font-size:11px;font-weight:700}
  .ph-ex .exm{font-size:9px;color:var(--ember)}
  .ph-ex .exs{font-size:9px;color:var(--text-3);margin-top:1px}
  .mbx{filter:drop-shadow(0 0 2px var(--orange))}

  /* Scanner screen */
  .ph-scan{border:1px dashed var(--border-hi);border-radius:14px;padding:18px 12px;text-align:center;background:var(--surface-2)}
  .ph-scan .big{font-size:30px}
  .ph-scan .lbl{font-size:10px;color:var(--text-2);margin-top:6px}
  .ph-scan .res{margin-top:10px;background:rgba(255,107,0,.1);border:1px solid var(--border-hi);border-radius:10px;padding:8px;font-size:10px}
  .ph-scan .res b{color:var(--ember)}

  /* Scarcity bar */
  .scarcity{max-width:480px;margin:0 0 14px}
  @media(max-width:860px){.scarcity{margin-inline:auto}}
  .scar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2);margin-bottom:5px}
  .scar-row b{color:var(--ember);font-family:var(--num)}
  .scar-track{height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;border:1px solid var(--border)}
  .scar-fill{height:100%;width:0;border-radius:99px;background:var(--ember-grad);box-shadow:0 0 10px rgba(255,107,0,.5);transition:width 1.6s cubic-bezier(.22,1,.36,1)}

  /* Tilt cards */
  .fc{transform-style:preserve-3d;will-change:transform}

  /* Marquee trust strip */
  .marquee{overflow:hidden;border-block:1px solid var(--border);background:var(--surface);padding:14px 0}
  .marquee-track{display:flex;gap:48px;white-space:nowrap;animation:marq 22s linear infinite;width:max-content}
  .marquee:hover .marquee-track{animation-play-state:paused}
  .marq-item{font-size:13px;color:var(--text-2);font-weight:600;display:flex;align-items:center;gap:8px}
  .marq-item span{color:var(--orange)}
  @keyframes marq{to{transform:translateX(-50%)}}
  [dir="rtl"] .marquee-track{animation-direction:reverse}

  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none}
    .orb,.phone,.pc.on,.pill .dot,.gap-highlight .hl,h1 .hl,.marquee-track{animation:none}
    .ring svg circle:last-of-type{animation:none;stroke-dashoffset:44}
    h1 .word-anim{opacity:1;transform:none;animation:none}
  }

  /* ═══════════ BOLDER MOTION PASS ═══════════ */
  /* punchier orbs */
  .orb{opacity:.7}
  .orb1{width:340px;height:340px}
  .orb2{width:280px;height:280px}
  /* snappier reveals — faster, tighter stagger */
  .reveal{transform:translateY(34px) scale(.975);transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1)}
  .reveal.in{transform:none}
  .reveal.d1{transition-delay:.05s}.reveal.d2{transition-delay:.1s}.reveal.d3{transition-delay:.15s}
  /* marquee faster + bigger */
  .marquee-track{animation-duration:16s}
  .marq-item{font-size:14px}
  /* stronger button shine + lift */
  .wait button:hover,.nav-cta:hover{box-shadow:0 8px 30px rgba(255,107,0,.45)}
  /* phone glow pulse */
  .phone{box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 60px rgba(255,107,0,.18);animation:phone-float 5s ease-in-out infinite,phone-glow 3s ease-in-out infinite}
  @keyframes phone-glow{0%,100%{box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 50px rgba(255,107,0,.14)}50%{box-shadow:0 40px 90px rgba(0,0,0,.6),0 0 80px rgba(255,107,0,.30)}}

  /* Global interactive particle field (whole page, behind content) */
  #globalParticles{position:fixed;inset:0;z-index:0;pointer-events:none}

  /* Health / injury / Vision 2030 stat band */
  .statband{position:relative;background:linear-gradient(135deg,#150d04,#0c0a08);border-block:1px solid var(--border);overflow:hidden}
  .statband .wrap{position:relative;z-index:1}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  @media(max-width:760px){.stat-grid{grid-template-columns:1fr 1fr}}

  .statc{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:30px 18px 24px;text-align:center;overflow:hidden;cursor:default;
    transition:transform .3s cubic-bezier(.22,1,.36,1),border-color .3s,box-shadow .3s}
  /* spotlight that follows the cursor (set via --mx/--my in JS) */
  .statc::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none;
    background:radial-gradient(220px circle at var(--mx,50%) var(--my,50%),rgba(255,107,0,.16),transparent 60%)}
  .statc:hover{transform:translateY(-6px);border-color:var(--border-hi);box-shadow:0 18px 44px rgba(0,0,0,.45),0 0 30px rgba(255,107,0,.12)}
  .statc:hover::before{opacity:1}
  /* animated underline bar */
  .statc::after{content:'';position:absolute;left:50%;bottom:0;width:0;height:3px;border-radius:3px;
    background:var(--ember-grad);transform:translateX(-50%);transition:width .35s cubic-bezier(.22,1,.36,1)}
  .statc:hover::after{width:70%}

  /* icon in a glowing ring */
  .statc-ic{position:relative;z-index:1;width:54px;height:54px;margin:0 auto 14px;border-radius:50%;
    display:grid;place-items:center;font-size:24px;
    background:radial-gradient(circle,rgba(255,107,0,.16),rgba(255,107,0,.04));
    border:1px solid var(--border-hi);transition:transform .3s}
  .statc:hover .statc-ic{transform:scale(1.12) rotate(-6deg)}
  .bignum{position:relative;z-index:1;font-family:var(--num);font-size:clamp(32px,4.4vw,48px);font-weight:700;
    color:var(--orange);line-height:1;text-shadow:0 0 22px rgba(255,107,0,.25)}
  .statc-l{position:relative;z-index:1;font-size:12.5px;color:var(--text-2);margin-top:10px;line-height:1.55}
  .stat-src{text-align:center;font-size:11px;color:var(--text-3);margin-top:26px;font-weight:300}

  @media (prefers-reduced-motion: reduce){ #globalParticles{display:none} }
</style>
</head>
<body dir="rtl">

<canvas id="globalParticles"></canvas>

/* ─── Supabase config (fill before deploy) ─── */
const SUPABASE_URL  = "https://pxhdptebzbudswrkgapf.supabase.co";
const SUPABASE_ANON = "REPLACE_WITH_ANON_KEY"; // public anon key — safe to expose (RLS protected)

let LANG = "ar";
function applyLang(l){
  LANG = l;
  const d = T[l];
  document.body.setAttribute("dir", l === "ar" ? "rtl" : "ltr");
  document.documentElement.setAttribute("lang", l);
  document.querySelectorAll("[data-i]").forEach(el=>{
    const v = d[el.getAttribute("data-i")];
    if(v!=null) el.innerHTML = v;
  });
  document.querySelectorAll("[data-i-ph]").forEach(el=>{
    const v = d[el.getAttribute("data-i-ph")];
    if(v!=null) el.placeholder = v;
  });
  // prayer cells
  document.querySelectorAll("[data-pray]").forEach(box=>{
    box.innerHTML = d.pray.map(p=>`<div class="pc${p[2]?' on':''}"><div class="n">${p[0]}</div><div class="t">${p[1]}</div></div>`).join("");
  });
  document.getElementById("langToggle").textContent = l === "ar" ? "EN" : "عربي";
}
document.getElementById("langToggle").onclick = ()=>applyLang(LANG==="ar"?"en":"ar");

/* ─── Waitlist submit → Supabase ─── */
async function submitEmail(email){
  if(SUPABASE_ANON==="REPLACE_WITH_ANON_KEY"){
    // preview mode (no backend yet)
    return {ok:true, preview:true};
  }
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`,{
      method:"POST",
      headers:{ "Content-Type":"application/json", apikey:SUPABASE_ANON,
        Authorization:`Bearer ${SUPABASE_ANON}`, Prefer:"return=minimal" },
      body:JSON.stringify({ email, lang:LANG, source:"landing" })
    });
    if(res.ok) return {ok:true};
    if(res.status===409) return {ok:true, dup:true}; // duplicate email
    return {ok:false};
  }catch{ return {ok:false}; }
}

document.querySelectorAll("form[data-wl]").forEach(form=>{
  form.addEventListener("submit", async e=>{
    e.preventDefault();
    const input = form.querySelector("input");
    const btn = form.querySelector("button");
    const msg = form.parentElement.querySelector("[data-msg]");
    const d = T[LANG];
    btn.disabled = true;
    const r = await submitEmail(input.value.trim());
    if(r.ok){
      msg.textContent = r.dup ? d.msgDup : d.msgOk;
      msg.className = "form-msg ok";
      input.value = "";
    }else{
      msg.textContent = d.msgErr; msg.className = "form-msg err"; btn.disabled = false;
    }
  });
});

applyLang("ar");

/* ═══════════ DYNAMIC / MOTION ENGINE ═══════════ */
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(!reduce){
  /* 1. Scroll reveal */
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold:0.15, rootMargin:'0px 0px -8% 0px' });
  document.querySelectorAll('.reveal, .step, .vision').forEach(el=>io.observe(el));

  /* 2. Count-up for numeric stats (runs once when visible) */
  const countEl = (el)=>{
    const raw = el.textContent.trim();
    const m = raw.match(/([+\-]?)(\d[\d,\.]*)(.*)/s); if(!m) return;
    const prefix=m[1], target=parseFloat(m[2].replace(/,/g,'')), suffix=m[3];
    const dur=1100, t0=performance.now(); const dec=(m[2].includes('.'))?1:0;
    const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); const v=(target*(1-Math.pow(1-p,3)));
      el.textContent = prefix + (dec? v.toFixed(dec): Math.round(v).toLocaleString()) + suffix;
      if(p<1) requestAnimationFrame(tick); };
    requestAnimationFrame(tick);
  };
  const statIO = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ countEl(e.target); statIO.unobserve(e.target); } });
  }, { threshold:0.6 });
  document.querySelectorAll('.vision .stat').forEach(el=>statIO.observe(el));

  /* Attribute-driven count-up for the health/Vision stat band */
  const bigIO = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(!e.isIntersecting) return; const el=e.target;
      const target=parseFloat(el.dataset.target), dec=parseInt(el.dataset.dec||'0',10);
      const pre=el.dataset.prefix||'', suf=el.dataset.suffix||'';
      const t0=performance.now(), dur=1400;
      const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); const v=target*(1-Math.pow(1-p,3));
        el.textContent=pre+(dec?v.toFixed(dec):Math.round(v))+suf; if(p<1) requestAnimationFrame(tick); };
      requestAnimationFrame(tick); bigIO.unobserve(el);
    });
  }, { threshold:0.5 });
  document.querySelectorAll('.bignum').forEach(el=>bigIO.observe(el));

  /* 3. Scroll progress bar */
  const prog=document.getElementById('scrollProg');
  const onScroll=()=>{ const h=document.documentElement; const sc=h.scrollTop/(h.scrollHeight-h.clientHeight);
    prog.style.width=(sc*100)+'%'; };
  document.addEventListener('scroll', onScroll, {passive:true}); onScroll();

  /* 4. Subtle parallax on hero orbs */
  const orbs=document.querySelectorAll('.orb');
  document.addEventListener('scroll', ()=>{ const y=window.scrollY;
    orbs.forEach((o,i)=>{ o.style.transform=`translateY(${y*(0.04+i*0.02)}px)`; });
  }, {passive:true});

  /* 5. Phone screen carousel (readiness → split → scanner) */
  let curScreen=0;
  const screens=document.querySelectorAll('.ph-screen');
  const dots=document.querySelectorAll('.ph-dot');
  if(screens.length){
    setInterval(()=>{
      curScreen=(curScreen+1)%screens.length;
      screens.forEach((s,i)=>s.classList.toggle('active', i===curScreen));
      dots.forEach((d,i)=>d.classList.toggle('on', i===curScreen));
    }, 2200);
  }

  /* 6. Card tilt on pointer move */
  document.querySelectorAll('.fc').forEach(card=>{
    card.addEventListener('pointermove',(e)=>{
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width-0.5, py=(e.clientY-r.top)/r.height-0.5;
      card.style.transform=`perspective(600px) rotateY(${px*7}deg) rotateX(${-py*7}deg) translateY(-3px)`;
    });
    card.addEventListener('pointerleave',()=>{ card.style.transform=''; });
  });

  /* 7. Magnetic primary buttons */
  document.querySelectorAll('.wait button, .nav-cta').forEach(btn=>{
    btn.addEventListener('pointermove',(e)=>{
      const r=btn.getBoundingClientRect();
      btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*0.18}px, ${(e.clientY-r.top-r.height/2)*0.3}px)`;
    });
    btn.addEventListener('pointerleave',()=>{ btn.style.transform=''; });
  });

  /* 8b. Stat card spotlight follows cursor */
  document.querySelectorAll('.statc').forEach(card=>{
    card.addEventListener('pointermove',(e)=>{
      const r=card.getBoundingClientRect();
      card.style.setProperty('--mx', ((e.clientX-r.left)/r.width*100)+'%');
      card.style.setProperty('--my', ((e.clientY-r.top)/r.height*100)+'%');
    });
  });

  /* 8c. GLOBAL interactive particle field (whole page, repels from cursor) */
  const gcv=document.getElementById('globalParticles');
  if(gcv){
    const gctx=gcv.getContext('2d'); let GW,GH,gp; const m={x:-999,y:-999};
    const sizeUp=()=>{ GW=gcv.width=innerWidth; GH=gcv.height=innerHeight;
      const n=Math.min(64, Math.floor(GW/26));
      gp=Array.from({length:n},()=>({x:Math.random()*GW,y:Math.random()*GH,
        r:Math.random()*2.2+0.7, vy:-(Math.random()*0.28+0.05), vx:(Math.random()-0.5)*0.14,
        a:Math.random()*0.45+0.18})); };
    sizeUp(); addEventListener('resize',sizeUp,{passive:true});
    // track cursor in viewport coords (canvas is fixed → viewport-aligned)
    addEventListener('pointermove',e=>{ m.x=e.clientX; m.y=e.clientY; },{passive:true});
    addEventListener('pointerleave',()=>{ m.x=-999; m.y=-999; });
    (function gdraw(){ gctx.clearRect(0,0,GW,GH);
      for(const p of gp){
        const dx=p.x-m.x, dy=p.y-m.y, d2=dx*dx+dy*dy;
        if(d2<34000){ const f=(34000-d2)/34000; const d=Math.sqrt(d2)||1; p.x+=dx/d*f*11; p.y+=dy/d*f*11; }
        p.x+=p.vx; p.y+=p.vy;
        if(p.y<-6){p.y=GH+6;p.x=Math.random()*GW;} if(p.x<-6)p.x=GW+6; if(p.x>GW+6)p.x=-6;
        gctx.beginPath(); gctx.arc(p.x,p.y,p.r,0,7);
        gctx.fillStyle=`rgba(255,150,60,${p.a})`; gctx.shadowBlur=8; gctx.shadowColor='rgba(255,107,0,.65)'; gctx.fill();
      }
      requestAnimationFrame(gdraw); })();
  }
}

/* 8. Hero headline word-by-word (runs after each language render) */
function animateHeadline(){
  const h1=document.querySelector('h1'); if(!h1) return;
  if(reduce) return;
  // wrap each top-level word/segment that isn't already a span, plus the .hl span
  h1.querySelectorAll('.hl').forEach(s=>s.classList.add('word-anim'));
  // wrap plain text nodes into word spans
  [...h1.childNodes].forEach(n=>{
    if(n.nodeType===3 && n.textContent.trim()){
      const frag=document.createDocumentFragment();
      n.textContent.split(/(\s+)/).forEach(w=>{
        if(/^\s+$/.test(w)){ frag.appendChild(document.createTextNode(w)); }
        else if(w){ const sp=document.createElement('span'); sp.className='word-anim'; sp.textContent=w; frag.appendChild(sp); }
      });
      n.replaceWith(frag);
    }
  });
  h1.querySelectorAll('.word-anim').forEach((s,i)=>{ s.style.animationDelay=(i*0.09)+'s'; });
}

/* 9. Scarcity bar fill + count (spots "left") */
function fillScarcity(){
  const fill=document.getElementById('scarFill'), n=document.getElementById('scarN');
  if(!fill||!n) return;
  const taken=347, total=500, left=total-taken; // demo numbers
  setTimeout(()=>{ fill.style.width=(taken/total*100)+'%'; }, 400);
  if(reduce){ n.textContent=left; return; }
  const t0=performance.now(), dur=1400;
  const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); n.textContent=Math.round(left*(1-Math.pow(1-p,3))); if(p<1) requestAnimationFrame(tick); };
  requestAnimationFrame(tick);
}

/* 10. Trust marquee content (duplicated for seamless loop) */
function buildMarquee(){
  const track=document.getElementById('marqTrack'); if(!track) return;
  const items = LANG==='ar'
    ? ['🛡️ فحص السلامة','🕌 أوقات الصلاة','🌙 وضع رمضان','🌸 برنامج نسائي','🔥 خريطة العضلات','📸 مسح بالذكاء','🏆 رؤية ٢٠٣٠']
    : ['🛡️ Safety Audit','🕌 Prayer Times','🌙 Ramadan Mode','🌸 Women\'s Track','🔥 Muscle Map','📸 AI Scan','🏆 Vision 2030'];
  const html = items.map(i=>`<span class="marq-item">${i}</span>`).join('');
  track.innerHTML = html + html; // duplicate for -50% loop
}

// Reduced-motion: show final stat values immediately
if(reduce){
  document.querySelectorAll('.bignum').forEach(el=>{
    const dec=parseInt(el.dataset.dec||'0',10);
    el.textContent=(el.dataset.prefix||'')+(dec?parseFloat(el.dataset.target).toFixed(dec):el.dataset.target)+(el.dataset.suffix||'');
  });
}

// run dynamic bits after first render + on each language switch
animateHeadline(); fillScarcity(); buildMarquee();
const _origApply = applyLang;
applyLang = function(l){ _origApply(l); animateHeadline(); buildMarquee(); };
