<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6B00"/><stop offset="1" stop-color="#FFC15E"/></linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="55%"><stop offset="0" stop-color="rgba(255,138,61,0.22)"/><stop offset="1" stop-color="rgba(255,138,61,0)"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0C0A08"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- left: text block -->
  <g transform="translate(80 0)">
    <g transform="translate(0 150)">
      <rect width="46" height="46" rx="12" fill="url(#g)"/>
      <text x="23" y="34" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="26" fill="#1a0f04">F</text>
      <text x="62" y="34" font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="34" fill="#F5EFE8">Fit<tspan fill="#FF6B00">Guard</tspan></text>
    </g>
    <text x="640" y="288" direction="rtl" text-anchor="start" font-family="'Cairo',Arial,sans-serif" font-weight="900" font-size="62" fill="#F5EFE8">قبل التمرين</text>
    <text x="640" y="380" direction="rtl" text-anchor="start" font-family="'Cairo',Arial,sans-serif" font-weight="900" font-size="62" fill="#FF6B00">نتأكد إن جسمك جاهز</text>
    <text x="640" y="450" direction="rtl" text-anchor="start" font-family="'Cairo',Arial,sans-serif" font-weight="400" font-size="28" fill="rgba(245,239,232,0.7)">أول مدرب لياقة ذكي بالعربي يحميك من الإصابة</text>
    <g transform="translate(0 492)">
      <rect width="290" height="44" rx="22" fill="rgba(255,107,0,0.1)" stroke="rgba(255,107,0,0.45)" stroke-width="1.5"/>
      <circle cx="28" cy="22" r="5" fill="#2BD9A0"/>
      <text x="270" y="30" direction="rtl" text-anchor="start" font-family="'Cairo',Arial,sans-serif" font-weight="700" font-size="20" fill="#FFC15E">قريباً · Q4 2026</text>
    </g>
  </g>
  <!-- right: phone mockup with readiness ring -->
  <g transform="translate(820 120)">
    <rect width="300" height="390" rx="38" fill="#0A0818" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <text x="150" y="58" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="20" fill="#F5EFE8">Fit<tspan fill="#FF6B00">Guard</tspan></text>
    <!-- readiness ring -->
    <g transform="translate(150 175)">
      <circle r="70" fill="none" stroke="#2a2017" stroke-width="13"/>
      <circle r="70" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" stroke-dasharray="440" stroke-dashoffset="100" transform="rotate(-90)"/>
      <text y="6" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="900" font-size="48" fill="#FFC15E">78</text>
      <text y="34" text-anchor="middle" direction="rtl" font-family="'Cairo',Arial,sans-serif" font-size="15" fill="rgba(245,239,232,0.5)">جاهزية</text>
    </g>
    <rect x="40" y="290" width="220" height="56" rx="14" fill="rgba(255,107,0,0.1)" stroke="rgba(255,107,0,0.4)"/>
    <text x="150" y="316" text-anchor="middle" direction="rtl" font-family="'Cairo',Arial,sans-serif" font-weight="700" font-size="17" fill="#FFC15E">جاهز للتمرين 💪</text>
    <text x="150" y="336" text-anchor="middle" direction="rtl" font-family="'Cairo',Arial,sans-serif" font-size="12" fill="rgba(245,239,232,0.55)">جسمك مستعد اليوم</text>
  </g>
